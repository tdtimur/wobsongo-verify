[[package]]
name = "wobsongo-verify"
version = "0.1.2"
source = { virtual = "." }
dependencies = [
    { name = "litestar" },
]

[package.optional-dependencies]
db = [
    { name = "sqlite-vec" },
]
docs = [
    { name = "mkdocs" },
    { name = "mkdocs-material" },
]
embed = [
    { name = "sentence-transformers" },
]
llm = [
    { name = "openai" },
]
pdf = [
    { name = "pymupdf4llm" },
]

[package.dev-dependencies]
dev = [
    { name = "mypy" },
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "uvicorn" },
]

[package.metadata]
requires-dist = [
    { name = "litestar", specifier = ">=2.0" },
    { name = "mkdocs", marker = "extra == 'docs'", specifier = ">=1.6.1" },
    { name = "mkdocs-material", marker = "extra == 'docs'", specifier = ">=9.7.1" },
    { name = "openai", marker = "extra == 'llm'", specifier = ">=1.0" },
    { name = "pymupdf4llm", marker = "extra == 'pdf'", specifier = ">=0.0.17" },
    { name = "sentence-transformers", marker = "extra == 'embed'", specifier = ">=3.0" },
    { name = "sqlite-vec", marker = "extra == 'db'", specifier = ">=0.1" },
]
provides-extras = ["embed", "db", "pdf", "llm", "docs"]

[package.metadata.requires-dev]
dev = [
    { name = "mypy", specifier = ">=1.10" },
    { name = "pytest", specifier = ">=8.0" },
    { name = "pytest-asyncio", specifier = ">=0.23" },
    { name = "uvicorn", specifier = ">=0.30" },
]
